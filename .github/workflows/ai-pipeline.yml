name: AI Pipeline

on:
  push:
    paths:
      - "Ideas/**/*.md"

jobs:
  generate-requirements:
    runs-on: ubuntu-latest

    steps:
      # ① リポジトリ取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # ② Node.jsセットアップ
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ③ Gemini CLIインストール
      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      # ④ デバッグ（Ideas確認）
      - name: Show Ideas
        run: |
          echo "===== Ideas ====="
          ls -R Ideas || echo "No Ideas folder"

          echo "===== Content ====="
          cat Ideas/*.md || echo "No markdown files"

      # ⑤ AI実行（Secrets利用）
      - name: Generate Requirements with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        run: |
          mkdir -p Requirements

          for file in Ideas/*.md; do
            echo "Processing: $file"

            gemini -p "
              あなたはプロダクト設計AIです。

              以下のアイデアをもとに、実装可能なRequirementsを作成してください。

              # ルール
              - MVP優先
              - 無駄な機能は禁止
              - 実装可能レベルまで分解
              - Markdown形式で出力

              # アイデア
              $(cat $file)
            " > Requirements/$(basename "$file")

            echo "Generated: Requirements/$(basename "$file")"
          done

      # ⑥ 出力確認
      - name: Show Requirements
        run: |
          echo "===== Requirements ====="
          ls -R Requirements || echo "No output"
          cat Requirements/*.md || echo "Empty output"

      # ⑦ commit & push
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add Requirements/

          git commit -m "auto: generate requirements from ideas" || echo "no changes"

          git push
