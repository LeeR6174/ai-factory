name: AI Requirements Generator (Gemini API)

on:
  push:
    paths:
      - "Ideas/**/*.md"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ① checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ② 1つのアイデアファイル取得
      - name: Get idea file
        id: file
        run: |
          FILE=$(ls Ideas/*.md 2>/dev/null | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No idea file found"
            exit 0
          fi

          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "Using: $FILE"

      # ③ Requirements生成（Gemini API直叩き）
      - name: Generate Requirements via Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p Requirements

          echo "Processing: $FILE"

          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
          -H "Content-Type: application/json" \
          -X POST \
          -d @- <<EOF
          {
            "contents": [
              {
                "parts": [
                  {
                    "text": "あなたはプロダクト設計AIです。\n\n以下のアイデアをもとに、実装可能なRequirementsを作成してください。\n\n# ルール\n- MVP優先\n- 無駄な機能は禁止\n- 実装可能レベルまで分解\n- Markdown形式で出力\n\n# アイデア\n$(cat $FILE)"
                  }
                ]
              }
            ]
          }
          EOF
          )

          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > Requirements/$(basename "$FILE")

      # ④ 出力確認
      - name: Show result
        run: |
          echo "===== Requirements ====="
          cat Requirements/*.md || true

      # ⑤ commit & push
      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add Requirements/

          git commit -m "auto: generate requirements (Gemini API)" || echo "no changes"

          git push