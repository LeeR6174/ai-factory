name: AI Requirements Generator

on:
  push:
    paths:
      - "Ideas/**/*.md"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ① リポジトリ取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # ② Nodeセットアップ（CLI用）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ③ Gemini CLIインストール
      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      # ④ Ideasから1ファイル取得（安全版）
      - name: Select idea file
        id: select
        run: |
          FILE=$(ls Ideas/*.md 2>/dev/null | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No idea files found"
            exit 0
          fi

          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "Selected file: $FILE"

      # ⑤ AIでRequirements生成
      - name: Generate Requirements
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        run: |
          mkdir -p Requirements

          echo "Processing: $FILE"

          gemini -p "
          あなたはプロダクト設計AIです。

          以下のアイデアをもとに、実装可能なRequirementsを作成してください。

          # ルール
          - MVP優先
          - 無駄な機能は禁止
          - 実装可能レベルまで分解
          - Markdown形式で出力

          # アイデア
          $(cat "$FILE")
          " > Requirements/$(basename "$FILE")

      # ⑥ 出力確認
      - name: Show output
        run: |
          echo "===== Requirements ====="
          ls -R Requirements || true
          cat Requirements/*.md || true

      # ⑦ commit & push
      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add Requirements/

          git commit -m "auto: generate requirements from idea" || echo "no changes"

          git push